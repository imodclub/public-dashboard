<!DOCTYPE html>
<html lang="th">

<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --sidebar-w: 240px;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: 'Sarabun', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            position: fixed;
            background: #1e293b;
            padding: 20px;
        }

        .main-content {
            margin-left: var(--sidebar-w);
            padding: 30px;
        }

        .nav-link {
            color: #94a3b8;
            cursor: pointer;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .nav-link.active {
            background: #3b82f6;
            color: white;
        }

        /* Glassmorphism Cards */
        .card-glass {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
        }

        .gradient-1 {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .gradient-2 {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .gradient-3 {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .gradient-4 {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h5 class="mb-4 text-center">เมนูรายงาน</h5>
        <div class="nav-link active" onclick="showPage('stats')"><i class="fas fa-chart-pie me-2"></i> สถิติภาพรวม</div>
        <div class="nav-link" onclick="showPage('charts')"><i class="fas fa-chart-line me-2"></i> กราฟแนวโน้ม</div>
        <div class="nav-link" onclick="showPage('diagrams')"><i class="fas fa-chart-bar me-2"></i> แผนภูมิงาน</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><span id="pageIcon"><i class="fas fa-chart-pie"></i></span> <span id="pageTitle">Dashboard
                    สรุปผลการปฏิบัติงาน</span></h3>
            <input type="date" class="form-control w-auto bg-dark text-white border-0">
        </div>

        <!-- Page 1: Stats -->
        <div id="page-stats" class="page-section">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card-glass gradient-1">
                        <div>งานซ่อมทั้งหมด</div>
                        <h2 class="mt-2">150</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-glass gradient-2">
                        <div>ผู้ตอบประเมิน</div>
                        <h2 class="mt-2">120</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-glass gradient-3">
                        <div>คะแนนพึงพอใจ</div>
                        <h2 class="mt-2">4.8</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-glass gradient-4">
                        <div>คะแนนปฏิบัติงาน</div>
                        <h2 class="mt-2">4.9</h2>
                    </div>
                </div>
            </div>
            <div class="card-glass">
                <h5><i class="fas fa-comments me-2"></i> ข้อเสนอแนะล่าสุด</h5>
                <hr>
                <div id="commentsList"></div>
            </div>
        </div>

        <!-- Page 2 & 3 Placeholder -->
        <div id="page-charts" class="page-section d-none">
            <h5>แสดงผลกราฟแนวโน้มตามช่วงวันที่...</h5>
        </div>
        <div id="page-diagrams" class="page-section d-none">
            <h5>แสดงผลแผนภูมิแยกประเภท...</h5>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('d-none'));
            document.getElementById('page-' + pageId).classList.remove('d-none');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>

</html>
