<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #0f172a; color: white; font-family: 'Sarabun', sans-serif; }
    .stat-card { border-radius: 20px; padding: 25px; color: white; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
    .bg-jobs { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .bg-evals { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .bg-sat { background: linear-gradient(135deg, #10b981, #059669); }
    .bg-perf { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .card-glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4">📊 Dashboard สรุปผลการปฏิบัติงาน</h2>
    
    <!-- ตัวเลือกวันที่ -->
    <div class="card-glass mb-4">
      <div class="row align-items-center">
        <div class="col-md-4"><label>จากวันที่:</label><input type="date" id="startDate" class="form-control bg-dark text-white border-0"></div>
        <div class="col-md-4"><label>ถึงวันที่:</label><input type="date" id="endDate" class="form-control bg-dark text-white border-0"></div>
        <div class="col-md-4"><button class="btn btn-primary w-100 mt-4" onclick="fetchData()">โหลดข้อมูล</button></div>
      </div>
    </div>

    <!-- ส่วนแสดงสถิติ -->
    <div class="row g-4 mb-4">
      <div class="col-md-3"><div class="stat-card bg-jobs"><div>งานซ่อม</div><h2 id="val-jobs">0</h2></div></div>
      <div class="col-md-3"><div class="stat-card bg-evals"><div>ผู้ตอบประเมิน</div><h2 id="val-evals">0</h2></div></div>
      <div class="col-md-3"><div class="stat-card bg-sat"><div>พึงพอใจ</div><h2 id="val-sat">0.0</h2></div></div>
      <div class="col-md-3"><div class="stat-card bg-perf"><div>ปฏิบัติงาน</div><h2 id="val-perf">0.0</h2></div></div>
    </div>
  </div>

  <script>
    // ใส่ URL ของ Web App จาก Google Apps Script ที่นี่
    const WEB_APP_URL = "https://script.google.com/macros/s/XXXXX_YOUR_WEB_APP_URL_XXXXX/exec";

    function fetchData() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      
      fetch(`${WEB_APP_URL}?action=getData&start=${start}&end=${end}`)
        .then(response => response.json())
        .then(data => {
          document.getElementById('val-jobs').innerText = data.totalJobs;
          document.getElementById('val-evals').innerText = data.totalEvals;
          document.getElementById('val-sat').innerText = data.avgSat;
          document.getElementById('val-perf').innerText = data.avgPerf;
        });
    }
  </script>
</body>
</html>
